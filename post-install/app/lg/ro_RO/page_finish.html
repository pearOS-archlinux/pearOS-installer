<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../../css/assistant-styles.css">
    <link rel="stylesheet" type="text/css" href="../../aa/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Borel&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <title>pearOS NiceC0re Installer</title>
  </head>
  <body onload="setTimeout(function(){ commit(); }, 10000);">
    <div id="welcome-display-container" class="welcome-aa-container">
      <div class="orb orb-1" id="welcomeOrb1"></div>
      <div class="orb orb-2" id="welcomeOrb2"></div>
      <svg class="hello-svg welcome-aa-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ff3b30;stop-opacity:1" />
            <stop offset="20%" style="stop-color:#ff9500;stop-opacity:1" />
            <stop offset="40%" style="stop-color:#ffcc00;stop-opacity:1" />
            <stop offset="60%" style="stop-color:#34c759;stop-opacity:1" />
            <stop offset="80%" style="stop-color:#007aff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#af52de;stop-opacity:1" />
          </linearGradient>
        </defs>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="hello-text-svg" id="welcomeSvgText">Bun venit</text>
      </svg>
    </div>
    <script src="../../js/engine.js"></script>
    <script src="../../aa/script.js"></script>

    <div id="post-install-progress" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);padding:16px 24px;z-index:100;font-family:Inter,sans-serif;">
      <div id="post-install-status" style="color:#ffffff;font-size:13px;margin-bottom:8px;min-height:18px;opacity:0.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      <details style="cursor:pointer;">
        <summary style="color:rgba(255,255,255,0.5);font-size:11px;list-style:none;">Show log</summary>
        <pre id="post-install-log" style="color:rgba(255,255,255,0.7);font-size:10px;max-height:120px;overflow-y:auto;margin:8px 0 0 0;padding:0;background:none;white-space:pre-wrap;word-break:break-all;"></pre>
      </details>
    </div>
  </body>
</html>
