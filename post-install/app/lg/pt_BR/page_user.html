<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="../../css/assistant-styles.css">
    <title>Instalador pearOS NiceC0re</title>
  </head>
  <body>
    <div class="flex-container">
      <div class="app">
        <button onclick="window.location.href=\'page_timezone.html\';" type="button" id="move-back-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
        </button>
        <div class="tabs">
          <div class="tab active">
            <br>
            <h1>Criar uma conta de computador</h1>
            <p align="center" class="description">Preencha as informações abaixo para criar sua conta.</p>
            <div id="create_user">
            <form>
              <input type="text" id="full_name" name="full_name" class="textbox" placeholder="Nome completo">
              <input type="text" id="account_name" name="account_name" class="textbox" placeholder="Nome da conta">
              <p class="account-name-hint">Este será o nome da sua pasta pessoal</p>
              <input type="text" id="hostname" name="hostname" class="textbox" placeholder="Hostname" value="pearOS-machine">
              <p class="account-name-hint">Este será o nome de rede do seu computador</p>
              <div class="password-row">
                <input type="password" id="password" name="password" class="textbox" placeholder="Senha">
                <input type="password" id="password_confirm" name="password_confirm" class="textbox" placeholder="Confirmar senha">
              </div>
              <div id="password_check" class="password-check"></div>
            </form>
            </div>
            <br><br>
          </div>
        </div>
        <div class="movement-buttons">
        <hr style="color:#ffffff">
          <div class="arrow-button-container">
            <button onclick="save_user();" class="nav-button button" type="button" id="move-forward-btn">Continuar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/engine.js"></script>
</html>
